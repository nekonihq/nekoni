# Development override — runs only Ollama infrastructure.
# Use with:   docker compose -f docker-compose.dev.yml up -d
# With GPU:   docker compose -f docker-compose.dev.yml -f docker-compose.gpu.yml up -d
#
# Run agent, signal, and dashboard locally with hot-reload (see README).

services:
  ollama:
    image: ollama/ollama:latest
    container_name: nekoni-ollama-dev
    volumes:
      - ./data/ollama:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  ollama-pull:
    image: ollama/ollama:latest
    container_name: nekoni-ollama-pull-dev
    volumes:
      - ./data/ollama:/root/.ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: "${OLLAMA_MODEL:-llama3.2}"
    entrypoint: >
      /bin/sh -c "
        until ollama list > /dev/null 2>&1; do
          echo 'Waiting for Ollama...'; sleep 2;
        done;
        echo \"Pulling model: $OLLAMA_MODEL\";
        ollama pull $OLLAMA_MODEL
      "
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"
